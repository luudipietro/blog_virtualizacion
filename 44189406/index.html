<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Personal - Luciano Di Pietro</title>
    
   <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
    <!-- <link rel="stylesheet" href="/44189406/static/style.css"> -->
    <style>
        body {
    font-family: system-ui, -apple-system, sans-serif;
    background-color: #1e1e1e;
    color: #f4f4f4;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: 0 auto;
    background: #252526;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

/* Contenedor flexible para alinear foto y texto de presentación */
.header-profile {
    display: flex;
    align-items: center;
    gap: 25px;
    border-bottom: 1px solid #444;
    padding-bottom: 25px;
    margin-bottom: 25px;
}

/* Estilo para tu imagen de perfil */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #007acc;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.profile-info h1 {
    margin: 0 0 5px 0;
    color: #ce9178;
}

.profile-info p {
    margin: 5px 0;
}

.post {
    background: #333333;
    padding: 20px;
    border-left: 4px solid #007acc;
    margin-bottom: 15px;
    border-radius: 4px;
}

.post h3 {
    margin-top: 0;
    color: #569cd6;
}

.form-box {
    background: #2d2d2d;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 30px;
    border: 1px solid #444;
}

input, textarea {
    width: 100%;
    margin-bottom: 15px;
    padding: 10px;
    box-sizing: border-box;
    background: #1e1e1e;
    border: 1px solid #555;
    color: white;
    border-radius: 4px;
}

button {
    background: #0e639c;
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    font-weight: bold;
}

button:hover {
    background: #1177bb;
}

a.btn {
    display: inline-block;
    background: #007acc;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 4px;
    font-weight: bold;
    margin-top: 10px;
}

/* --- BARRA SUPERIOR FLOTANTE --- */
.top-bar {
    position: fixed;
    top: 0; left: 0; width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    box-sizing: border-box;
    z-index: 500;
    pointer-events: none; /* Para no bloquear clics en el fondo */
}

.top-bar > * {
    pointer-events: auto; /* Reactiva los clics solo en los botones */
}

.btn-top {
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    text-decoration: none;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.2s, filter 0.2s;
}

.btn-top:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn-pdf { background: #c53030; color: white; }
.btn-login { background: #007acc; color: white; }
.btn-logout { background: #d16969; color: white; }

/* --- BADGES DE CONTACTO (FLOTANTES EN EL PERFIL) --- */
.badges-container {
    display: flex;
    gap: 12px;
    margin-top: 15px;
    flex-wrap: wrap;
}

.badge {
    background: #333;
    color: #ddd;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    border: 1px solid #555;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
}

.badge:hover {
    background: #007acc;
    color: white;
    border-color: #007acc;
    transform: translateY(-2px);
}

/* --- MEJORA DEL MODAL (GLASSMORPHISM) --- */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(5px); /* Efecto de desenfoque moderno */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

/* Margen extra al contenedor principal para que la top-bar no lo tape */
.container { margin-top: 80px; }

.modal-content {
    background: #252526;
    padding: 30px;
    border-radius: 8px;
    width: 100%;
    max-width: 350px;
    border: 1px solid #444;
    box-shadow: 0 5px 20px rgba(0,0,0,0.8);
}

.fecha-post {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 10px;
    display: block;
}
.btn-login, .btn-logout {
    margin-left: auto;
}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function ModalLogin({ isOpen, onClose, onLogin, user, setUser, pass, setPass }) {
            if (!isOpen) return null;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
                            <h3 style={{ margin: 0, color: '#4ec9b0' }}>🔒 Acceso Sistema</h3>
                            <button onClick={onClose} style={{ background: 'none', padding: 0, color: '#888' }}>✖</button>
                        </div>
                        <form onSubmit={onLogin} style={{ display: 'flex', flexDirection: 'column' }}>
                            <input placeholder="Usuario..." value={user} onChange={e => setUser(e.target.value)} autoFocus />
                            <input type="password" placeholder="Contraseña..." value={pass} onChange={e => setPass(e.target.value)} />
                            <button type="submit">Ingresar</button>
                        </form>
                    </div>
                </div>
            );
        }

        function PerfilUsuario() {
            return (
                <div className="header-profile">
                    <img src="/44189406/static/perfil.jpeg" alt="Luciano" className="profile-img" />
                    <div className="profile-info">
                        <h1 style={{ margin: '0 0 5px 0', color: '#ce9178' }}>Luciano Di Pietro</h1>
                        <p style={{ fontWeight: '500', margin: '5px 0' }}>Estudiante de Ingeniería en Sistemas de Información | UTN FRT</p>
                        <p style={{ color: '#9cdcfe', fontSize: '0.95rem' }}>Intereses: Desarrollo Backend (Python/FastAPI), Tecnologías AgTech, Análisis y Ciencia de Datos.</p>
                        
                        <div className="badges-container">
                            <a href="mailto:tu-correo@gmail.com" className="badge">
                                <span>📧</span> Email
                            </a>
                            <a href="https://linkedin.com/in/tu-perfil" target="_blank" className="badge">
                                <span>💼</span> LinkedIn
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        function Blog() {
            const [posts, setPosts] = React.useState([]);
            const [titulo, setTitulo] = React.useState("");
            const [contenido, setContenido] = React.useState("");
            
            const [username, setUsername] = React.useState("");
            const [password, setPassword] = React.useState("");
            const [token, setToken] = React.useState(sessionStorage.getItem("token_tpf") || "");
            const [showLogin, setShowLogin] = React.useState(false); 

            React.useEffect(() => {
                fetch("/44189406/api/entradas")
                    .then(res => res.json())
                    .then(data => setPosts(data));
            }, []);

            const hacerLogin = async (e) => {
                e.preventDefault();
                const formData = new URLSearchParams();
                formData.append("username", username);
                formData.append("password", password);

                const res = await fetch("/44189406/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    setToken(data.access_token);
                    sessionStorage.setItem("token_tpf", data.access_token);
                    setPassword("");
                    setShowLogin(false);
                } else {
                    alert("Usuario o contraseña incorrectos");
                }
            };

            const cerrarSesion = () => {
                setToken("");
                sessionStorage.removeItem("token_tpf");
            };

            const publicar = async (e) => {
                e.preventDefault();
                if(!titulo || !contenido) return;

                const res = await fetch("/44189406/api/entradas", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify({ titulo, contenido })
                });
                
                if (res.ok) {
                    const nuevaEntrada = await res.json();
                    setPosts([nuevaEntrada, ...posts]);
                    setTitulo("");
                    setContenido("");
                } else {
                    alert("Sesión inválida. Loguéate de nuevo.");
                    cerrarSesion();
                }
            };

            const formatearFecha = (fecha) => {
                if (!fecha) return "";
                return new Date(fecha).toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            };

            return (
                <div>
                    <div className="top-bar">
                        <a href="/44189406/tpf.pdf" className="btn-top btn-pdf" target="_blank">📄 PDF Informe TPF</a>
                        
                        {token ? (
                            <button onClick={cerrarSesion} className="btn-top btn-logout">Cerrar Sesión</button>
                        ) : (
                            <button onClick={() => setShowLogin(true)} className="btn-top btn-login">🔑 Administrador</button>
                        )}
                    </div>

                    <ModalLogin 
                        isOpen={showLogin} 
                        onClose={() => setShowLogin(false)} 
                        onLogin={hacerLogin} 
                        user={username} setUser={setUsername} 
                        pass={password} setPass={setPassword} 
                    />

                    <div className="container">
                        <PerfilUsuario />

                        {token && (
                            <div className="form-box">
                                <h3 style={{ marginTop: 0, color: '#4ec9b0' }}>➕ Publicar nueva actualización</h3>
                                <form onSubmit={publicar}>
                                    <input placeholder="Título..." value={titulo} onChange={e => setTitulo(e.target.value)} />
                                    <textarea placeholder="Contenido..." rows="3" value={contenido} onChange={e => setContenido(e.target.value)}></textarea>
                                    <button type="submit">Publicar en el servidor</button>
                                </form>
                            </div>
                        )}

                        <h2>Actualizaciones del Proyecto</h2>
                        {posts.length === 0 ? <p style={{ color: '#888' }}>Sin actualizaciones registradas.</p> : null}
                        
                        {posts.map(post => (
                            <div key={post.id} className="post">
                                <h3>{post.titulo}</h3>
                                <span className="fecha-post">🕒 {formatearFecha(post.fecha)}</span>
                                <p>{post.contenido}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Blog />);
    </script>
</body>
</html>
